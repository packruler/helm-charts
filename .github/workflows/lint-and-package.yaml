name: Lint and Package Charts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Create package dir
        run: mkdir -p packaged-charts

      - name: Lint and package charts
        run: |
          set -euo pipefail
          for d in charts/*; do
            if [ -f "$d/Chart.yaml" ]; then
              echo "Linting $d"
              helm lint "$d"
              echo "Packaging $d"
              helm package --destination packaged-charts "$d"
            fi
          done

      - name: Upload packaged charts (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: packaged-charts
          path: packaged-charts/*.tgz
